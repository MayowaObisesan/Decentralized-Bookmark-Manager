kind = "web"
previewPath = "/"
title = "Decentralized Bookmark Manager"
version = "1.0.0"
id = "artifacts/bookmark-dapp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25723

[services.development]
run = "pnpm --filter @workspace/bookmark-dapp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bookmark-dapp", "run", "build" ]
publicDir = "artifacts/bookmark-dapp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25723"
BASE_PATH = "/"
